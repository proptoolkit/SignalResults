<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Results — March 2025</title>
<style>
/* ── Reset & Base ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0f0f1a;
  color: #d1d4dc;
  overflow: hidden;
}

/* ── Layout ─────────────────────────────────────────────────── */
#app {
  display: flex; flex-direction: column;
  height: 100vh; width: 100%;
}

/* ── Stats Header ───────────────────────────────────────────── */
#stats-bar {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 6px; padding: 10px 16px;
  background: #161625;
  border-bottom: 1px solid #2a2a3e;
  min-height: 56px;
}
#stat-cards {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  flex: 1;
}
#stats-bar .month-title {
  font-size: 15px; font-weight: 700; color: #e1e4ea;
  margin-right: 12px; white-space: nowrap;
}
.stat-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 14px;
  background: #1c1c30;
  border-radius: 6px;
  border: 1px solid #2a2a3e;
  min-width: 90px;
}
.stat-card .label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: #787b86; margin-bottom: 2px; white-space: nowrap;
}
.stat-card .value {
  font-size: 15px; font-weight: 700; white-space: nowrap;
}
.val-pos { color: #26a69a; }
.val-neg { color: #ef5350; }
.val-neutral { color: #d1d4dc; }

/* ── $ / % Toggle & Balance Dropdown ───────────────────────── */
#pnl-controls {
  display: flex; align-items: center; gap: 6px;
  margin-left: auto;
}
#pnl-mode-toggle {
  padding: 4px 12px; font-size: 11px; font-weight: 700;
  border: 1px solid #2a2a3e; border-radius: 4px;
  background: #1c1c30; color: #787b86;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
#pnl-mode-toggle:hover { background: #252540; color: #d1d4dc; }
#pnl-mode-toggle .active-mode { color: #26a69a; }
#pnl-controls select {
  padding: 4px 8px; font-size: 11px; font-weight: 600;
  border: 1px solid #2a2a3e; border-radius: 4px;
  background: #1c1c30; color: #d1d4dc;
  cursor: pointer; outline: none;
}
#pnl-controls select:hover { background: #252540; }
.ctrl-label {
  font-size: 10px; color: #787b86; text-transform: uppercase;
  letter-spacing: 0.5px; white-space: nowrap;
}

/* ── Main Area (chart + panel) ──────────────────────────────── */
#main {
  display: flex; flex: 1; overflow: hidden;
}
#chart-area {
  flex: 1; display: flex; flex-direction: column;
  position: relative; min-width: 0;
}
#tf-toggle {
  display: flex; gap: 4px; padding: 8px 12px;
  background: #161625;
  border-bottom: 1px solid #2a2a3e;
}
#tf-toggle button {
  padding: 5px 16px; font-size: 12px; font-weight: 600;
  border: 1px solid #2a2a3e; border-radius: 4px;
  background: #1c1c30; color: #787b86;
  cursor: pointer; transition: all 0.15s;
}
#tf-toggle button:hover { background: #252540; color: #d1d4dc; }
#tf-toggle button.active {
  background: #26a69a; color: #fff; border-color: #26a69a;
}
#chart-container {
  flex: 1; position: relative;
}

/* ── Trade Panel ────────────────────────────────────────────── */
#trade-panel {
  width: 320px; min-width: 280px;
  background: #161625;
  border-left: 1px solid #2a2a3e;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#panel-header {
  padding: 10px 14px;
  font-size: 13px; font-weight: 700;
  color: #e1e4ea;
  border-bottom: 1px solid #2a2a3e;
  display: flex; align-items: center; justify-content: space-between;
}
#panel-header .trade-count { color: #787b86; font-weight: 400; }
#sort-controls {
  display: flex; gap: 4px; padding: 6px 14px;
  border-bottom: 1px solid #2a2a3e;
}
#sort-controls button {
  padding: 3px 10px; font-size: 10px; font-weight: 600;
  border: 1px solid #2a2a3e; border-radius: 3px;
  background: #1c1c30; color: #787b86;
  cursor: pointer; text-transform: uppercase;
}
#sort-controls button:hover { background: #252540; color: #d1d4dc; }
#sort-controls button.active { color: #26a69a; border-color: #26a69a; }
#trade-list {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: #2a2a3e #161625;
}
#trade-list::-webkit-scrollbar { width: 6px; }
#trade-list::-webkit-scrollbar-track { background: #161625; }
#trade-list::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }

.trade-item {
  padding: 10px 14px;
  border-bottom: 1px solid #1e1e32;
  cursor: pointer;
  transition: background 0.12s;
}
.trade-item:hover { background: #1e1e35; }
.trade-item.selected { background: #1a2a3a; border-left: 3px solid #26a69a; }
.trade-item .row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 3px;
}
.trade-item .row:last-child { margin-bottom: 0; }
.trade-item .trade-id {
  font-size: 11px; font-weight: 700; color: #787b86; margin-right: 6px;
}
.trade-item .direction {
  font-size: 11px; font-weight: 700; padding: 1px 6px;
  border-radius: 3px;
}
.dir-buy { background: rgba(38,166,154,0.15); color: #26a69a; }
.dir-sell { background: rgba(239,83,80,0.15); color: #ef5350; }
.trade-item .symbol { font-size: 12px; font-weight: 600; color: #d1d4dc; }
.trade-item .pnl { font-size: 13px; font-weight: 700; }
.trade-item .meta {
  font-size: 10px; color: #787b86;
}
.trade-item .exit-tag {
  font-size: 9px; padding: 1px 5px; border-radius: 2px;
  background: #252540; color: #787b86;
}

/* ── Footer ─────────────────────────────────────────────────── */
#footer {
  padding: 6px 16px;
  font-size: 10px; color: #555;
  background: #0f0f1a;
  border-top: 1px solid #1e1e32;
  text-align: center;
}

/* ── Responsive: stack below 800px ──────────────────────────── */
@media (max-width: 800px) {
  #main { flex-direction: column; }
  #trade-panel {
    width: 100%; min-width: 0;
    max-height: 35vh;
    border-left: none; border-top: 1px solid #2a2a3e;
  }
}
</style>
</head>

</div>

<!-- TradingView Lightweight Charts v4 -->
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<script>
"use strict";

/* ================================================================
   DATA & STATE
   ================================================================ */
const DATA = JSON.parse(document.getElementById("report-data").textContent);
let currentTF = "5M";
let selectedTradeId = null;
let chart = null;
let candleSeries = null;
let tradePrimitive = null;
let pnlMode = "%";        // "%" or "$"
let selectedBalance = 100000;  // default, synced with dropdown
let selectedRisk = 1.0;       // default, synced with dropdown
const baseRisk = DATA.baseRisk || 1.0;  // risk % used when trades were taken

function tradeEntryTs(t) { return currentTF === "5M" ? t.entry5M : t.entry1H; }
function tradeExitTs(t)  { return currentTF === "5M" ? t.exit5M  : t.exit1H; }

/* Scale a base percentage by the risk multiplier */
function scalePct(pct) { return pct * (selectedRisk / baseRisk); }

/* Convert a percentage to dollar amount using selected balance (after risk scaling) */
function pctToDollar(pct) { return scalePct(pct) * selectedBalance / 100; }

/* ================================================================
   $ / % TOGGLE & BALANCE DROPDOWN
   ================================================================ */
function togglePnlMode() {
  pnlMode = pnlMode === "%" ? "$" : "%";
  const btn = document.getElementById("pnl-mode-toggle");
  if (pnlMode === "%") {
    btn.innerHTML = '<span class="active-mode">%</span> / $';
  } else {
    btn.innerHTML = '% / <span class="active-mode">$</span>';
  }
  renderStats();
  renderTradeList();
  setAllMarkers();
}

function onRiskChange() {
  selectedRisk = parseFloat(document.getElementById("risk-select").value);
  renderStats();
  renderTradeList();
  setAllMarkers();
}

function onBalanceChange() {
  selectedBalance = parseInt(document.getElementById("balance-select").value);
  if (pnlMode === "$") {
    renderStats();
    renderTradeList();
    setAllMarkers();
  }
}

/* Format a PnL percentage for display based on current mode */
function fmtPnl(pctVal) {
  if (pctVal == null || pctVal === "N/A") return "N/A";
  if (pnlMode === "%") {
    const v = scalePct(pctVal);
    const sign = v >= 0 ? "+" : "";
    return sign + v.toFixed(2) + "%";
  }
  const dollarVal = pctToDollar(pctVal);
  const sign = dollarVal >= 0 ? "+" : "";
  return sign + "$" + dollarVal.toFixed(2);
}

function fmtStat(pctVal, decimals) {
  if (pctVal == null || pctVal === "N/A") return "N/A";
  if (pnlMode === "%") {
    return scalePct(pctVal).toFixed(decimals != null ? decimals : 2) + "%";
  }
  const dollarVal = pctToDollar(pctVal);
  return "$" + dollarVal.toFixed(decimals != null ? decimals : 2);
}

/* ================================================================
   STATS HEADER
   ================================================================ */
function renderStats() {
  const s = DATA.stats;
  document.getElementById("month-title").textContent = DATA.monthLabel + " Results";
  const container = document.getElementById("stat-cards");
  container.innerHTML = "";

  const items = [
    { label: "Net P&L",       value: fmtStat(s.net_pnl_pct), cls: s.net_pnl_pct >= 0 ? "val-pos" : "val-neg" },
    { label: "Max Drawdown",  value: fmtStat(s.max_drawdown_pct), cls: "val-neg" },
    { label: "Max Daily DD",  value: fmtStat(s.max_daily_dd_pct), cls: "val-neg" },
    { label: "Profit Factor", value: s.profit_factor,  cls: "val-neutral" },
    { label: "Sharpe Ratio",  value: s.sharpe_ratio,   cls: "val-neutral" },
    { label: "Total Trades",  value: s.total_trades,   cls: "val-neutral" },
    { label: "Win Rate",      value: s.win_rate_pct + "%", cls: s.win_rate_pct >= 50 ? "val-pos" : "val-neg" },
    { label: "Avg Win",       value: fmtStat(s.avg_win_pct), cls: "val-pos" },
    { label: "Avg Loss",      value: fmtStat(s.avg_loss_pct), cls: "val-neg" },
  ];

  items.forEach(it => {
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = '<div class="label">' + it.label + '</div>'
                   + '<div class="value ' + it.cls + '">' + it.value + '</div>';
    container.appendChild(card);
  });
}

/* ================================================================
   CHART
   ================================================================ */
function getCandles() {
  return currentTF === "5M" ? DATA.candles5M : DATA.candles1H;
}

function createChart() {
  const container = document.getElementById("chart-container");

  chart = LightweightCharts.createChart(container, {
    width:  container.clientWidth,
    height: container.clientHeight,
    layout: {
      background: { type: "solid", color: "#0f0f1a" },
      textColor: "#787b86",
      fontSize: 11,
    },
    grid: {
      vertLines: { color: "#1e1e32" },
      horzLines: { color: "#1e1e32" },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
      vertLine: { color: "#787b86", width: 1, style: LightweightCharts.LineStyle.Dashed, labelBackgroundColor: "#2a2a3e" },
      horzLine: { color: "#787b86", width: 1, style: LightweightCharts.LineStyle.Dashed, labelBackgroundColor: "#2a2a3e" },
    },
    rightPriceScale: {
      borderColor: "#2a2a3e",
      scaleMargins: { top: 0.1, bottom: 0.1 },
    },
    timeScale: {
      borderColor: "#2a2a3e",
      timeVisible: true,
      secondsVisible: false,
      rightOffset: 5,
    },
    handleScroll: { mouseWheel: true, pressedMouseMove: true },
    handleScale: { axisPressedMouseMove: true, mouseWheel: true, pinch: true },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor:       "#26a69a",
    downColor:     "#ef5350",
    borderUpColor: "#26a69a",
    borderDownColor: "#ef5350",
    wickUpColor:   "#26a69a",
    wickDownColor: "#ef5350",
  });

  loadCandles();
  setAllMarkers();
  attachTradePrimitive();

  const ro = new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
  ro.observe(container);
}

function loadCandles() {
  candleSeries.setData(getCandles());
  chart.timeScale().fitContent();
}

function switchTimeframe(tf) {
  currentTF = tf;
  document.getElementById("btn-5m").classList.toggle("active", tf === "5M");
  document.getElementById("btn-1h").classList.toggle("active", tf === "1H");
  loadCandles();
  setAllMarkers();
  // Primitive auto-redraws since it's attached to the series
}

/* ================================================================
   MARKERS — show entry/exit arrows for ALL trades
   ================================================================ */
function setAllMarkers() {
  const markers = [];
  DATA.trades.forEach(t => {
    const entryTs = tradeEntryTs(t);
    const exitTs  = tradeExitTs(t);
    const isBuy = t.direction === "BUY";

    markers.push({
      time: entryTs,
      position: isBuy ? "belowBar" : "aboveBar",
      color: isBuy ? "#26a69a" : "#ef5350",
      shape: isBuy ? "arrowUp" : "arrowDown",
      text: "#" + t.id + " " + t.direction,
      size: 1,
    });
    const exitLabel = pnlMode === "%" ?
      (scalePct(t.pnlPct) >= 0 ? "+" : "") + scalePct(t.pnlPct).toFixed(2) + "%" :
      (pctToDollar(t.pnlPct) >= 0 ? "+" : "") + "$" + pctToDollar(t.pnlPct).toFixed(0);
    markers.push({
      time: exitTs,
      position: isBuy ? "aboveBar" : "belowBar",
      color: t.pnlPct >= 0 ? "#26a69a" : "#ef5350",
      shape: "circle",
      text: "#" + t.id + " " + exitLabel,
      size: 0,
    });
  });
  markers.sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(markers);
}

/* ================================================================
   SERIES PRIMITIVE — draws trade zones inside chart's render cycle.
   This is the Lightweight Charts v4 "plugin" API. The primitive is
   attached to the candle series so its draw() runs every frame,
   using the chart's own coordinate conversion. Rectangles scroll
   and zoom perfectly with the candles.
   ================================================================ */
function attachTradePrimitive() {
  // PaneRenderer: does the actual canvas drawing
  class TradeRenderer {
    constructor(tradeData) {
      this._data = tradeData;
    }
    draw(target) {
      target.useBitmapCoordinateSpace(scope => {
        const ctx = scope.context;
        const data = this._data;
        if (!data || !data.length) return;

        data.forEach(d => {
          // d = { x1, x2, yEntry, ySL, yTP, yExit, pnlPct, isSelected }
          const x1 = Math.round(d.x1 * scope.horizontalPixelRatio);
          const x2 = Math.round(d.x2 * scope.horizontalPixelRatio);
          const yEntry = Math.round(d.yEntry * scope.verticalPixelRatio);
          const ySL = Math.round(d.ySL * scope.verticalPixelRatio);
          const yTP = Math.round(d.yTP * scope.verticalPixelRatio);
          const yExit = d.yExit != null ? Math.round(d.yExit * scope.verticalPixelRatio) : null;

          const left = Math.min(x1, x2);
          const right = Math.max(x1, x2);
          const boxW = Math.max(right - left, 2 * scope.horizontalPixelRatio);
          const sel = d.isSelected;
          const alpha = sel ? 0.28 : 0.10;
          const borderA = sel ? 0.75 : 0.30;

          // SL zone (red)
          const slTop = Math.min(yEntry, ySL);
          const slH = Math.abs(ySL - yEntry);
          ctx.fillStyle = "rgba(239,83,80," + alpha + ")";
          ctx.fillRect(left, slTop, boxW, slH);
          if (sel) {
            ctx.strokeStyle = "rgba(239,83,80," + borderA + ")";
            ctx.lineWidth = 1.5 * scope.horizontalPixelRatio;
            ctx.strokeRect(left, slTop, boxW, slH);
          }

          // TP zone (green)
          const tpTop = Math.min(yEntry, yTP);
          const tpH = Math.abs(yTP - yEntry);
          ctx.fillStyle = "rgba(38,166,154," + alpha + ")";
          ctx.fillRect(left, tpTop, boxW, tpH);
          if (sel) {
            ctx.strokeStyle = "rgba(38,166,154," + borderA + ")";
            ctx.lineWidth = 1.5 * scope.horizontalPixelRatio;
            ctx.strokeRect(left, tpTop, boxW, tpH);
          }

          // Entry line (yellow dashed)
          ctx.save();
          ctx.strokeStyle = "rgba(255,235,59," + (sel ? 0.6 : 0.2) + ")";
          ctx.lineWidth = (sel ? 1.5 : 0.75) * scope.horizontalPixelRatio;
          ctx.setLineDash([4 * scope.horizontalPixelRatio, 3 * scope.horizontalPixelRatio]);
          ctx.beginPath();
          ctx.moveTo(left, yEntry);
          ctx.lineTo(left + boxW, yEntry);
          ctx.stroke();
          ctx.restore();

          // Trade path line: entry → exit
          if (yExit != null) {
            ctx.save();
            ctx.strokeStyle = (d.pnlPct >= 0 ? "rgba(38,166,154," : "rgba(239,83,80,") + (sel ? 0.85 : 0.35) + ")";
            ctx.lineWidth = (sel ? 2.5 : 1) * scope.horizontalPixelRatio;
            ctx.beginPath();
            ctx.moveTo(x1, yEntry);
            ctx.lineTo(x2, yExit);
            ctx.stroke();
            ctx.restore();
          }

          // Labels for selected trade
          if (sel) {
            const fs = Math.round(10 * scope.verticalPixelRatio);
            ctx.font = "bold " + fs + "px -apple-system,sans-serif";
            ctx.fillStyle = "rgba(239,83,80,0.9)";
            ctx.fillText("SL " + d.slPrice, left + 4 * scope.horizontalPixelRatio, Math.max(ySL, yEntry) + 13 * scope.verticalPixelRatio);
            ctx.fillStyle = "rgba(38,166,154,0.9)";
            ctx.fillText("TP " + d.tpPrice, left + 4 * scope.horizontalPixelRatio, Math.min(yTP, yEntry) - 4 * scope.verticalPixelRatio);
            ctx.fillStyle = "rgba(255,235,59,0.9)";
            ctx.fillText("Entry " + d.entryPrice, left + 4 * scope.horizontalPixelRatio, yEntry - 5 * scope.verticalPixelRatio);
          }
        });
      });
    }
  }

  // PaneView: converts trade data from chart coords to pixel coords
  class TradePaneView {
    constructor(source) {
      this._source = source;
      this._data = [];
    }
    update() {
      this._data = [];
      const series = this._source._series;
      const timeScale = this._source._chart.timeScale();

      DATA.trades.forEach(t => {
        const entryTs = tradeEntryTs(t);
        const exitTs  = tradeExitTs(t);

        const x1 = timeScale.timeToCoordinate(entryTs);
        const x2 = timeScale.timeToCoordinate(exitTs);
        const yEntry = series.priceToCoordinate(t.entryPrice);
        const ySL    = series.priceToCoordinate(t.sl);
        const yTP    = series.priceToCoordinate(t.tp);
        const yExit  = series.priceToCoordinate(t.exitPrice);

        if (x1 == null || x2 == null || yEntry == null || ySL == null || yTP == null) return;

        this._data.push({
          x1: x1, x2: x2,
          yEntry: yEntry, ySL: ySL, yTP: yTP,
          yExit: yExit,
          pnlPct: t.pnlPct,
          isSelected: t.id === selectedTradeId,
          slPrice: t.sl.toFixed(2),
          tpPrice: t.tp.toFixed(2),
          entryPrice: t.entryPrice.toFixed(2),
        });
      });
    }
    renderer() {
      return new TradeRenderer(this._data);
    }
  }

  // The primitive itself: wires into the chart's render pipeline
  class TradeOverlayPrimitive {
    constructor(ch, series) {
      this._chart = ch;
      this._series = series;
      this._paneView = new TradePaneView(this);
    }
    updateAllViews() {
      this._paneView.update();
    }
    paneViews() {
      return [this._paneView];
    }
    attached(param) {
      // called when primitive is attached to series
    }
    detached() {
      // cleanup if needed
    }
  }

  tradePrimitive = new TradeOverlayPrimitive(chart, candleSeries);
  candleSeries.attachPrimitive(tradePrimitive);
}

// Force the chart to redraw (triggers primitive updateAllViews + draw)
function requestRedraw() {
  if (chart) {
    // Lightweight Charts redraws on any option change — trigger minimal one
    chart.applyOptions({});
  }
}

/* ================================================================
   NAVIGATE TO TRADE — zoom/pan to show the selected trade
   ================================================================ */
function navigateToTrade(tradeId) {
  const trade = DATA.trades.find(t => t.id === tradeId);
  if (!trade) return;

  const entryTs = tradeEntryTs(trade);
  const exitTs  = tradeExitTs(trade);
  const duration = exitTs - entryTs;

  const minPad = currentTF === "5M" ? 1800 : 7200;
  const pad = Math.max(duration * 1.5, minPad);

  chart.timeScale().setVisibleRange({
    from: entryTs - pad,
    to:   exitTs + pad,
  });
}

/* ================================================================
   TRADE LIST PANEL
   ================================================================ */
let sortMode = "date";

function renderTradeList() {
  const list = document.getElementById("trade-list");
  list.innerHTML = "";

  let trades = [...DATA.trades];
  if (sortMode === "date") {
    trades.sort((a, b) => a.entry5M - b.entry5M);
  } else if (sortMode === "pnl") {
    trades.sort((a, b) => b.pnlPct - a.pnlPct);
  } else if (sortMode === "symbol") {
    trades.sort((a, b) => a.symbol.localeCompare(b.symbol) || a.entry5M - b.entry5M);
  }

  document.getElementById("trade-count").textContent = "(" + trades.length + ")";

  trades.forEach(t => {
    const el = document.createElement("div");
    el.className = "trade-item" + (t.id === selectedTradeId ? " selected" : "");
    el.dataset.id = t.id;

    const dirCls = t.direction === "BUY" ? "dir-buy" : "dir-sell";
    const pnlCls = t.pnlPct >= 0 ? "val-pos" : "val-neg";
    const pnlStr = fmtPnl(t.pnlPct);
    const openDate = new Date(t.openTime);
    const dateStr = openDate.toLocaleDateString("en-GB", { day:"2-digit", month:"short" });
    const timeStr = openDate.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit", hour12:false });

    el.innerHTML =
      '<div class="row">' +
        '<div><span class="trade-id">#' + t.id + '</span>' +
        '<span class="direction ' + dirCls + '">' + t.direction + '</span></div>' +
        '<span class="pnl ' + pnlCls + '">' + pnlStr + '</span>' +
      '</div>' +
      '<div class="row">' +
        '<span class="symbol">' + t.symbol + '</span>' +
        '<span class="meta">' + t.entryPrice.toFixed(2) + ' &rarr; ' + t.exitPrice.toFixed(2) + '</span>' +
      '</div>' +
      '<div class="row">' +
        '<span class="meta">' + dateStr + ' ' + timeStr + '</span>' +
        '<span class="exit-tag">' + t.exitType.replace("_", " ") + '</span>' +
      '</div>';

    el.addEventListener("click", () => selectTrade(t.id));
    list.appendChild(el);
  });
}

function selectTrade(id) {
  selectedTradeId = id;
  document.querySelectorAll(".trade-item").forEach(el => {
    el.classList.toggle("selected", parseInt(el.dataset.id) === id);
  });
  navigateToTrade(id);
  requestRedraw();
}

function sortTrades(mode) {
  sortMode = mode;
  document.querySelectorAll("#sort-controls button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
  renderTradeList();
}

/* ================================================================
   INITIALISATION
   ================================================================ */
document.addEventListener("DOMContentLoaded", () => {
  renderStats();
  createChart();
  renderTradeList();
  if (DATA.trades.length > 0) {
    selectTrade(DATA.trades[0].id);
  }
});
</script>
